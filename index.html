<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Editor</title>
  <link rel="stylesheet" href="vendor/quill/dist/quill.snow.css">
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="src/styles/theme-defaults.css">
  <link rel="stylesheet" href="src/styles/editor.css">
  <link rel="stylesheet" href="src/styles/slash-command.css">
  <link rel="stylesheet" href="src/styles/toolbar.css">
</head>
<body>

  <div id="app">

    <header id="app-header">
      <div class="header-brand">
        <svg class="brand-icon" width="18" height="18" viewBox="0 0 18 18" fill="none"
             aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 2h9l3 3v11a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z"
                fill="currentColor" fill-opacity="0.15"
                stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
          <path d="M12 2v3.5H15" stroke="currentColor" stroke-width="1.25"
                stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M5 8h8M5 11h6M5 14h4" stroke="currentColor" stroke-width="1.25"
                stroke-linecap="round"/>
        </svg>
        <span class="brand-name">Content Editor</span>
      </div>
      <div class="header-actions">
        <span class="header-status" id="save-status">unsaved</span>
        <button class="header-btn" id="export-btn">Export HTML</button>
      </div>
    </header>

    <div id="app-body">

      <aside id="sidebar" aria-label="Theme settings panel">
        <div class="sidebar-header">
          <span class="sidebar-title">Theme</span>
        </div>
        <div class="sidebar-content" id="theme-panel">

          <div class="theme-presets">
            <button class="preset-btn" data-preset="neutral">Neutral</button>
            <button class="preset-btn" data-preset="bold">Bold</button>
            <button class="preset-btn" data-preset="soft">Soft</button>
          </div>

          <div class="theme-section">
            <div class="theme-section-title">Colors</div>
            <div class="theme-row">
              <label class="theme-label" for="cp-primary">Primary</label>
              <input type="color" class="theme-color" id="cp-primary" data-var="--color-primary">
            </div>
            <div class="theme-row">
              <label class="theme-label" for="cp-secondary">Secondary</label>
              <input type="color" class="theme-color" id="cp-secondary" data-var="--color-secondary">
            </div>
            <div class="theme-row">
              <label class="theme-label" for="cp-accent">Accent</label>
              <input type="color" class="theme-color" id="cp-accent" data-var="--color-accent">
            </div>
            <div class="theme-row">
              <label class="theme-label" for="cp-background">Background</label>
              <input type="color" class="theme-color" id="cp-background" data-var="--color-background">
            </div>
            <div class="theme-row">
              <label class="theme-label" for="cp-surface">Surface</label>
              <input type="color" class="theme-color" id="cp-surface" data-var="--color-surface">
            </div>
            <div class="theme-row">
              <label class="theme-label" for="cp-text">Text</label>
              <input type="color" class="theme-color" id="cp-text" data-var="--color-text">
            </div>
            <div class="theme-row">
              <label class="theme-label" for="cp-text-muted">Muted text</label>
              <input type="color" class="theme-color" id="cp-text-muted" data-var="--color-text-muted">
            </div>
            <div class="theme-row">
              <label class="theme-label" for="cp-border">Border</label>
              <input type="color" class="theme-color" id="cp-border" data-var="--color-border">
            </div>
          </div>

          <div class="theme-section">
            <div class="theme-section-title">Typography</div>
            <div class="theme-row">
              <label class="theme-label" for="ff-body">Body</label>
              <select class="theme-select" id="ff-body" data-var="--font-family-body">
                <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                <option value="Inter, system-ui, sans-serif">Inter</option>
                <option value="Arial, Helvetica, sans-serif">Arial</option>
                <option value="'Times New Roman', Times, serif">Times New Roman</option>
                <option value="Verdana, Geneva, sans-serif">Verdana</option>
                <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                <option value="Palatino, 'Palatino Linotype', serif">Palatino</option>
                <option value="'Courier New', Courier, monospace">Courier New</option>
              </select>
            </div>
            <div class="theme-row">
              <label class="theme-label" for="ff-heading">Heading</label>
              <select class="theme-select" id="ff-heading" data-var="--font-family-heading">
                <option value="Inter, system-ui, sans-serif">Inter</option>
                <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                <option value="Arial, Helvetica, sans-serif">Arial</option>
                <option value="'Times New Roman', Times, serif">Times New Roman</option>
                <option value="Verdana, Geneva, sans-serif">Verdana</option>
                <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                <option value="Palatino, 'Palatino Linotype', serif">Palatino</option>
                <option value="'Courier New', Courier, monospace">Courier New</option>
              </select>
            </div>
            <div class="theme-row">
              <label class="theme-label" for="fs-base">Size</label>
              <select class="theme-select" id="fs-base" data-var="--font-size-base">
                <option value="0.875rem">Small (14px)</option>
                <option value="1rem">Medium (16px)</option>
                <option value="1.0625rem">Regular (17px)</option>
                <option value="1.125rem">Large (18px)</option>
              </select>
            </div>
            <div class="theme-row">
              <label class="theme-label" for="lh-base">Line height</label>
              <select class="theme-select" id="lh-base" data-var="--line-height-base">
                <option value="1.4">Tight (1.4)</option>
                <option value="1.6">Normal (1.6)</option>
                <option value="1.7">Relaxed (1.7)</option>
                <option value="1.8">Loose (1.8)</option>
              </select>
            </div>
          </div>

          <div class="theme-section">
            <div class="theme-section-title">Layout</div>
            <div class="theme-row">
              <label class="theme-label" for="cmw">Max width</label>
              <select class="theme-select" id="cmw" data-var="--content-max-width">
                <option value="680px">Narrow (680px)</option>
                <option value="780px">Medium (780px)</option>
                <option value="860px">Standard (860px)</option>
                <option value="960px">Wide (960px)</option>
              </select>
            </div>
            <div class="theme-row">
              <label class="theme-label" for="brd">Corners</label>
              <select class="theme-select" id="brd" data-var="--widget-border-radius">
                <option value="0">Sharp</option>
                <option value="0.25rem">Slight</option>
                <option value="0.5rem">Medium</option>
                <option value="0.75rem">Round</option>
                <option value="1rem">Full</option>
              </select>
            </div>
          </div>

          <div class="theme-footer">
            <button class="reset-btn" id="reset-theme">Reset to default</button>
          </div>

        </div>
      </aside>

      <main id="editor-area" role="main" aria-label="Document editor">
        <div id="editor-wrap">
          <div id="editor"></div>
        </div>
      </main>

    </div>

  </div>

  <script src="vendor/quill/dist/quill.js"></script>
  <script src="src/ui/modal.js"></script>
  <script src="src/registry.js"></script>
  <script src="src/blots/base.js"></script>
  <script src="src/blots/callout.js"></script>
  <script src="src/blots/tabs.js"></script>
  <script src="src/blots/accordion.js"></script>
  <script src="src/blots/quote.js"></script>
  <script src="src/blots/timeline.js"></script>
  <script src="src/blots/flip-cards.js"></script>
  <script src="src/blots/click-reveal.js"></script>
  <script src="src/blots/carousel.js"></script>
  <script src="src/blots/hotspot.js"></script>
  <script src="src/editor.js"></script>
  <script src="src/slash-command.js"></script>
  <script src="src/toolbar.js"></script>
  <script src="src/theme.js"></script>
  <script src="src/export.js"></script>
</body>
</html>
