<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Editor</title>
  <link rel="stylesheet" href="vendor/quill/dist/quill.snow.css">
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="src/styles/editor.css">
</head>
<body>

  <div id="app">

    <header id="app-header">
      <div class="header-brand">
        <svg class="brand-icon" width="18" height="18" viewBox="0 0 18 18" fill="none"
             aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 2h9l3 3v11a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z"
                fill="currentColor" fill-opacity="0.15"
                stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
          <path d="M12 2v3.5H15" stroke="currentColor" stroke-width="1.25"
                stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M5 8h8M5 11h6M5 14h4" stroke="currentColor" stroke-width="1.25"
                stroke-linecap="round"/>
        </svg>
        <span class="brand-name">Content Editor</span>
      </div>
      <div class="header-actions">
        <span class="header-status" id="save-status">unsaved</span>
      </div>
    </header>

    <div id="app-body">

      <aside id="sidebar" aria-label="Theme settings panel">
        <div class="sidebar-header">
          <span class="sidebar-title">Theme</span>
        </div>
        <div class="sidebar-content" id="theme-panel">
          <p class="sidebar-placeholder">Theme controls coming in the next stage.</p>
        </div>
      </aside>

      <main id="editor-area" role="main" aria-label="Document editor">
        <div id="editor-wrap">
          <div id="editor"></div>
        </div>
      </main>

    </div>

  </div>

  <script src="vendor/quill/dist/quill.js"></script>
  <script src="src/editor.js"></script>
</body>
</html>
